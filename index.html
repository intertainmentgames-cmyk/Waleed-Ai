<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Bazaar AI Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0b0f19;
            color: #f1f5f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .chat-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 20px;
            text-align: center;
            font-size: 16pt;
            font-weight: 700;
            color: #38bdf8;
            border-bottom: 1px solid #1e293b;
            background-color: #0f172a;
        }
        .chat-box {
            flex-grow: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .message-wrapper {
            width: 100%;
            display: flex;
        }
        .user-wrapper { justify-content: flex-end; }
        .ai-wrapper { justify-content: flex-start; }
        
        .message {
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 11pt;
            line-height: 1.5;
            max-width: 75%;
            word-wrap: break-word;
        }
        .user-msg {
            background-color: #2563eb;
            color: #ffffff;
            border-bottom-right-radius: 2px;
        }
        .ai-msg {
            background-color: #1e293b;
            color: #e2e8f0;
            border-left: 4px solid #38bdf8;
            border-bottom-left-radius: 2px;
        }
        .input-area {
            padding: 20px 25px;
            border-top: 1px solid #1e293b;
            background-color: #0f172a;
        }
        .input-wrapper {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 14px 20px;
            border-radius: 30px;
            border: 1px solid #334155;
            background-color: #1e293b;
            color: #ffffff;
            font-size: 11pt;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #38bdf8; }
        button {
            padding: 14px 30px;
            border-radius: 30px;
            border: none;
            background-color: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            font-size: 11pt;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        button:hover { background-color: #0ea5e9; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">Brand Bazaar Custom Live AI</div>
    
    <div class="chat-box" id="chatBox">
        <div class="message-wrapper ai-wrapper">
            <div class="message ai-msg">Asalam-o-Alaikum! Main aapka custom internet-connected AI chatbot hoon. Poochein aaj kya janna chahte hain?</div>
        </div>
    </div>
    
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Ask me anything... I will search the web live" onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    function handleKeyPress(e) {
        if(e.key === 'Enter') { sendMessage(); }
    }

    async function sendMessage() {
        const inputEl = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        const text = inputEl.value.trim();
        if(!text) return;
        
        // Append User Message
        chatBox.innerHTML += `<div class="message-wrapper user-wrapper"><div class="message user-msg">${text}</div></div>`;
        inputEl.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;
        
        // Temporary Loading State
        const tempId = 'loading-' + Date.now();
        chatBox.innerHTML += `<div class="message-wrapper ai-wrapper" id="${tempId}"><div class="message ai-msg">🔍 Searching Google & analyzing context...</div></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
        
        try {
            // Local Python Server API Call
            const response = await fetch('http://127.0.0.1:8000/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_query: text })
            });
            const data = await response.json();
            
            document.getElementById(tempId).remove();
            chatBox.innerHTML += `<div class="message-wrapper ai-wrapper"><div class="message ai-msg">${data.response}</div></div>`;
        } catch (err) {
            document.getElementById(tempId).remove();
            chatBox.innerHTML += `<div class="message-wrapper ai-wrapper"><div class="message ai-msg" style="color:#ef4444; border-left-color:#ef4444;">Error: Local Backend Server se connection nahi ho saka. Pehle terminal me app.py chalaein.</div></div>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
