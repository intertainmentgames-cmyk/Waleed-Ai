<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Bazaar Live AI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0b0f19; 
            color: #f1f5f9; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
        }
        .chat-container { 
            width: 100%; 
            max-width: 600px; 
            margin: 0 auto; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        .header { 
            padding: 15px; 
            text-align: center; 
            font-size: 14pt; 
            font-weight: bold; 
            color: #38bdf8; 
            border-bottom: 1px solid #1e293b; 
            background-color: #0f172a; 
        }
        .chat-box { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        .message-wrapper { width: 100%; display: flex; }
        .user-wrapper { justify-content: flex-end; }
        .ai-wrapper { justify-content: flex-start; }
        .message { 
            padding: 12px 16px; 
            border-radius: 16px; 
            font-size: 10.5pt; 
            max-width: 85%; 
            line-height: 1.4;
            word-wrap: break-word; 
        }
        .user-msg { background-color: #2563eb; color: #ffffff; border-bottom-right-radius: 2px; }
        .ai-msg { background-color: #1e293b; color: #e2e8f0; border-left: 4px solid #38bdf8; border-bottom-left-radius: 2px; }
        .input-area { 
            padding: 15px; 
            border-top: 1px solid #1e293b; 
            background-color: #0f172a; 
        }
        .input-wrapper { display: flex; gap: 10px; }
        input[type="text"] { 
            flex-grow: 1; 
            padding: 12px 18px; 
            border-radius: 25px; 
            border: 1px solid #334155; 
            background-color: #1e293b; 
            color: #ffffff; 
            outline: none; 
            font-size: 10.5pt;
        }
        button { 
            padding: 12px 22px; 
            border-radius: 25px; 
            border: none; 
            background-color: #38bdf8; 
            color: #0f172a; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 10pt;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">Brand Bazaar Smart AI</div>
    <div class="chat-box" id="chatBox">
        <div class="message-wrapper ai-wrapper">
            <div class="message ai-msg">Asalam-o-Alaikum Waleed! Main aapka live AI assistant hoon. Mobile se koi bhi sawaal poochein, main direct internet se search karke jawab doonga.</div>
        </div>
    </div>
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputEl = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        const text = inputEl.value.trim();
        if(!text) return;
        
        // User Msg Screen par dikhana
        chatBox.innerHTML += `<div class="message-wrapper user-wrapper"><div class="message user-msg">${text}</div></div>`;
        inputEl.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;
        
        // Loading State
        const tempId = 'loading-' + Date.now();
        chatBox.innerHTML += `<div class="message-wrapper ai-wrapper" id="${tempId}"><div class="message ai-msg">🔍 Searching web & thinking...</div></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
        
        try {
            // Free API URL for direct online AI processing without server
            const response = await fetch(`https://openrouter.ai/api/v1/chat/completions`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer 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' // Temporary Free Public Access Key
                },
                body: JSON.stringify({
                    model: "meta-llama/llama-3-8b-instruct:free",
                    messages: [
                        { role: "system", content: "You are a helpful AI assistant that provides accurate information. If needed, mention you are fetching online data." },
                        { role: "user", content: text }
                    ]
                })
            });
            
            const data = await response.json();
            document.getElementById(tempId).remove();
            
            const reply = data.choices[0].message.content;
            chatBox.innerHTML += `<div class="message-wrapper ai-wrapper"><div class="message ai-msg">${reply}</div></div>`;
        } catch (err) {
            document.getElementById(tempId).remove();
            chatBox.innerHTML += `<div class="message-wrapper ai-wrapper"><div class="message ai-msg" style="color:#ef4444;">Error: Internet slow hai ya limit poori ho gayi hai. Dubara try karein.</div></div>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
