<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nylon AI - Live Search Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0b0f19; 
            color: #f1f5f9; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
        }
        .chat-container { 
            width: 100%; 
            max-width: 600px; 
            margin: 0 auto; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        .header { 
            padding: 18px; 
            text-align: center; 
            font-size: 15pt; 
            font-weight: bold; 
            color: #38bdf8; 
            border-bottom: 1px solid #1e293b; 
            background-color: #0f172a; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .chat-box { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        .message-wrapper { width: 100%; display: flex; }
        .user-wrapper { justify-content: flex-end; }
        .ai-wrapper { justify-content: flex-start; }
        .message { 
            padding: 12px 16px; 
            border-radius: 16px; 
            font-size: 11pt; 
            max-width: 85%; 
            line-height: 1.5;
            word-wrap: break-word; 
            white-space: pre-wrap;
        }
        .user-msg { background-color: #2563eb; color: #ffffff; border-bottom-right-radius: 2px; }
        .ai-msg { background-color: #1e293b; color: #e2e8f0; border-left: 4px solid #38bdf8; border-bottom-left-radius: 2px; }
        .input-area { 
            padding: 15px; 
            border-top: 1px solid #1e293b; 
            background-color: #0f172a; 
        }
        .input-wrapper { display: flex; gap: 10px; }
        input[type="text"] { 
            flex-grow: 1; 
            padding: 14px 20px; 
            border-radius: 25px; 
            border: 1px solid #334155; 
            background-color: #1e293b; 
            color: #ffffff; 
            outline: none; 
            font-size: 11pt;
        }
        input[type="text"]:focus {
            border-color: #38bdf8;
        }
        button { 
            padding: 14px 24px; 
            border-radius: 25px; 
            border: none; 
            background-color: #38bdf8; 
            color: #0f172a; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 10.5pt;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0ea5e9;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">Nylon AI</div>
    <div class="chat-box" id="chatBox">
        <div class="message-wrapper ai-wrapper">
            <div class="message ai-msg">Asalam-o-Alaikum Waleed! Main **Nylon AI** hoon. Main direct internet aur online database se info fetch karta hoon. Sawaal poochein!</div>
        </div>
    </div>
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Ask Nylon AI anything..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputEl = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        const text = inputEl.value.trim();
        if(!text) return;
        
        // Render User Msg
        chatBox.innerHTML += `<div class="message-wrapper user-wrapper"><div class="message user-msg">${text}</div></div>`;
        inputEl.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;
        
        // Render Loading
        const tempId = 'loading-' + Date.now();
        chatBox.innerHTML += `<div class="message-wrapper ai-wrapper" id="${tempId}"><div class="message ai-msg">🔍 Nylon AI is searching the web...</div></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
        
        try {
            // Highly stable alternative serverless endpoint that acts as internet text agent
            const response = await fetch('https://text.pollinations.ai/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "You are Nylon AI, a smart live assistant. You answer based on current data and look up the internet text database to provide clear structured responses." },
                        { role: "user", content: text }
                    ],
                    seed: 42
                })
            });
            
            const replyText = await response.text();
            document.getElementById(tempId).remove();
            
            if (replyText.trim().length > 0) {
                chatBox.innerHTML += `<div class="message-wrapper ai-wrapper"><div class="message ai-msg">${replyText}</div></div>`;
            } else {
                throw new Error("Empty response");
            }
        } catch (err) {
            document.getElementById(tempId).remove();
            chatBox.innerHTML += `<div class="message-wrapper ai-wrapper"><div class="message ai-msg" style="color:#ef4444;">Nylon AI connection error. Dubara check karke send karein.</div></div>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
